name: restaurantos_mobile
description: RestaurantOS — App móvil multi-funcional
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # HTTP + API
  http: ^1.2.2
  dio: ^5.7.0

  # Local storage
  shared_preferences: ^2.3.4

  # Socket.io
  socket_io_client: ^3.0.2

  # Push notifications
  firebase_messaging: ^15.1.6
  firebase_core: ^3.9.0

  # QR
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  badges: ^3.1.2
  flutter_staggered_animations: ^1.1.1
  pull_to_refresh: ^2.0.0
  lottie: ^3.1.3
  intl: ^0.19.0
  fl_chart: ^0.70.2
  table_calendar: ^3.1.2
  image_picker: ^1.1.2

  # Utils
  uuid: ^4.5.1
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
